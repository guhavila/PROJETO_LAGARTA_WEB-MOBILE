<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site de Teste</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:#333;
            color:white;
            padding:15px;
            text-align:center;
        }

        nav{
            background:#555;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            margin:10px;
            text-decoration:none;
            font-weight:bold;
        }

        nav a:hover{
            text-decoration:underline;
        }

        .container{
            padding:20px;
            text-align:center;
        }

        button{
            padding:10px 20px;
            background:#007BFF;
            border:none;
            color:white;
            font-size:16px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#0056b3;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:10px;
            position:fixed;
            bottom:0;
            width:100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Meu Site de Teste</h1>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
</nav>

<div class="container">
    <h2>Bem-vindo!</h2>
    <p>Este é um site simples feito apenas para teste em HTML.</p>

    <img src="https://picsum.photos/400/200" alt="Imagem de teste">

    <br><br>

    <button onclick="mostrarMensagem()">Clique aqui</button>
</div>

<footer>
    <p>© 2026 Meu Site de Teste</p>
</footer>

<script>
function mostrarMensagem(){
    alert("Você clicou no botão!");
}
</script>

</body>
</html>
