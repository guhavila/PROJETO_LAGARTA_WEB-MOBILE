<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal Center</title>
    <link href="estilos/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <a href="index.html"><img src="img/Logo.png" alt="Logo"></a>
        
        <button class="menu" id="btnMenu" onclick="toggleMenu()" aria-label="Abrir Menu">
            <i class="fas fa-bars"></i>
        </button>

        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="#">Produto</a>
        </nav>
    </header>

    <section id="carrosel">
        <section onclick="rolar()" id="slides">
            <a href="kits.html" class="slide-link">
                <img src="img/Tudo para sua instalação.png" alt="slide1 - Kits">
            </a>
            <a href="pagina-utensilios.html" class="slide-link">
                <img src="img/slide_utencilios.png" alt="slide2 - Utensílios">
            </a>
            <a href="formulario.html" class="slide-link">
                <img src="img/slide_conheca.png" alt="slide3 - Formulário">
            </a>
        </section>
        
        <button class="btn_carrosel" id="voltarBtn" onclick="voltarIndex()">Voltar</button>
        <button class="btn_carrosel" id="avancarBtn" onclick="avancarIndex()">Avançar</button>
    </section>

    <section id="popular">
        <section class="items">
            <h2>Mais vendidos</h2>
            <section class="container-items">
                <a href="pagina-utensilios.html" class="link-card">
                    <article>
                        <img src="img/tabua.webp" alt="produto-1">
                        <p>Utensílios para cozinha</p>
                    </article>
                </a>
                <a href="jarras.html" class="link-card">
                    <article>
                        <img src="img/liquidificador.webp" alt="produto-2">
                        <p>Liquidificador</p>
                    </article>
                </a>
                <a href="kits.html" class="link-card">
                    <article>
                        <img src="img/mangueira.webp" alt="produto-3">
                        <p>Kits para instalação</p>
                    </article>
                </a>
            </section>
        </section>
        
        <section class="items">
            <h2>Categorias</h2>
            <section class="container-items">
                <a href="pagina-utensilios.html" class="link-card">
                    <article>
                        <img src="img/fogao.webp" alt="categoria-1">
                        <p>Fogões Camping</p>
                    </article>
                </a>
                <a href="regulador.html" class="link-card">
                    <article>
                        <img src="img/Regulador.webp" alt="categoria-2">
                        <p>Reguladores</p>
                    </article>
                </a>
                <a href="kits.html" class="link-card">
                    <article>
                        <img src="img/Central.png" alt="categoria-3">
                        <p>Central de gás</p>
                    </article>
                </a>
            </section>
        </section>
    </section>

    <footer id="contato">
        <article class="info-empresa">
            <h3>Canal Center</h3>
            <p><i class="fas fa-map-marker-alt"></i> Rua Major Otaviano, 232, andar 2 - São Paulo, SP</p>
            <p><i class="fas fa-phone"></i> (11) 2613-3245</p>
            <p><i class="fas fa-envelope"></i> contato@canalcenter.com.br</p>

            <a href="formulario.html" class="btn-contato">Contate-nos</a>
        </article>

        <section id="redes-sociais">
            <h3>Fale Conosco</h3>
            <div class="icones-redes">
                <a href="" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            </div>
        </section>
     </footer>
    <script src="script.js"></script>
</body>
</html>
